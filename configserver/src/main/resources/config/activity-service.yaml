spring:
  application:
    name: activity-service
  mongodb:
    uri: mongodb://localhost:27017/fitness_activity
    database: fitness_activity
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8082

eureka:
  client:
    serviceUrl:
        defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

rabbitmq:
  exchange:
    name: fitness_exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking